# Example secrets file
# DO NOT COMMIT THIS FILE WITH REAL VALUES
# Use: kubectl apply -f secrets-example.yaml
# Or better: use external secrets management like Vault or Sealed Secrets

apiVersion: v1
kind: Secret
metadata:
  name: qubot-secrets
  namespace: qubot
type: Opaque
stringData:
  # Database
  database-url: "postgresql+asyncpg://user:password@postgres:5432/qubot_db"
  
  # Redis
  redis-url: "redis://redis:6379/0"
  
  # Security
  secret-key: "your-super-secret-key-change-this-in-production"
  
  # LLM Providers (optional)
  openai-api-key: ""
  anthropic-api-key: ""
  google-api-key: ""
  groq-api-key: ""
