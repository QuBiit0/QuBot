---
apiVersion: v1
kind: Service
metadata:
  name: qubot-frontend
  namespace: qubot
  labels:
    app: qubot-frontend
spec:
  selector:
    app: qubot-frontend
  ports:
    - port: 80
      targetPort: 3000
      name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qubot-frontend
  namespace: qubot
  labels:
    app: qubot-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: qubot-frontend
  template:
    metadata:
      labels:
        app: qubot-frontend
    spec:
      containers:
        - name: frontend
          image: qubot/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.qubot.io/api/v1"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.qubot.io/ws"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qubot-frontend
  namespace: qubot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qubot-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
